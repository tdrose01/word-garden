name: PR cloud tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-cloud-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit, feedback, build, and browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm test

      - name: Run feedback regression
        run: npm run test:feedback

      - name: Build production bundle
        run: npm run build

      - name: Run browser smoke
        run: npm run test:smoke
